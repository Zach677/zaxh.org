scopes:
    - name: src
      description: React application code and components in src/; does not include data or scripts
    - name: data
      description: Static content files for posts and pages in data/; does not include source code or plugins
    - name: plugins
      description: Plugin modules in plugins/; does not include core application code or scripts
    - name: scripts
      description: Build, generate, and utility scripts in scripts/; does not cover source code or data
    - name: types
      description: TypeScript type definitions in types/; does not cover implementation code
