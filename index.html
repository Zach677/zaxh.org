<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!--META-SLOT-->
    <script>
      ;(() => {
        var t = localStorage.getItem('app_theme')
        if (t !== 'system' && t !== 'light' && t !== 'dark') {
          t = 'system'
        }
        document.documentElement.dataset.theme = t
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500;1,8..60,600&family=Noto+Serif+SC:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link href="/src/style.css" rel="stylesheet" />
    <link rel="icon" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
